<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance & Creative Strategy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #152016;
      color: #ddd8c4;
      font-family: 'EB Garamond', serif;
      font-size: 19px;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .site-wrap {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 100vh;
    }

    .left {
      border-right: 1px solid #2a3a2c;
      padding: 48px 40px 48px 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* CHANGE THIS: update photo filename if it changes */
    .photo-circle {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #2a3a2c;
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .left-name {
      font-size: 26px;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .left-socials { margin-top: auto; }

    .social-icon {
      width: 36px;
      height: 36px;
      border: 1px solid #3a5040;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .social-icon:hover { opacity: 1; border-color: #6a9070; }
    .social-icon svg { width: 16px; height: 16px; fill: #ddd8c4; }

    .right {
      padding: 56px 64px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 32px;
    }

    .top-section {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .star-wrap {
      position: relative;
      width: 130px;
      height: 90px;
      display: inline-block;
    }

    .star {
      font-size: 36px;
      color: #c8d4a0;
      display: inline-block;
      animation: slowspin 8s linear infinite;
      position: absolute;
      top: 20px;
      left: 40px;
      cursor: default;
    }
    .star:hover { color: #ddd8c4; }

    .speck {
      position: absolute;
      color: #c8d4a0;
      animation: floatDrift linear infinite;
      pointer-events: none;
    }
    .speck:nth-child(2) { font-size:14px; top:4px;  left:10px;  animation-duration:3.1s; opacity:0.6; }
    .speck:nth-child(3) { font-size:10px; top:60px; left:5px;   animation-duration:4.4s; opacity:0.4; }
    .speck:nth-child(4) { font-size:16px; top:0px;  left:80px;  animation-duration:3.7s; opacity:0.7; }
    .speck:nth-child(5) { font-size:8px;  top:65px; left:95px;  animation-duration:5.2s; opacity:0.35; }
    .speck:nth-child(6) { font-size:12px; top:28px; left:108px; animation-duration:2.9s; opacity:0.5; }

    @keyframes slowspin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes floatDrift {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .headline {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .headline-name {
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      font-style: italic;
      color: #c8d4a0;
      letter-spacing: -0.01em;
      line-height: 1.05;
    }

    .headline-line {
      font-family: 'EB Garamond', serif;
      font-size: clamp(18px, 2.2vw, 24px);
      font-weight: 400;
      color: #8a9e8d;
      font-style: italic;
      line-height: 1.4;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 20px;
      margin-top: 8px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 10px;
      bottom: 10px;
      width: 1px;
      background: #2a3a2c;
    }
    .tl-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 0 10px 20px;
      position: relative;
    }
    .tl-item::before {
      content: '';
      position: absolute;
      left: -15px;
      top: 16px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4a6a4e;
      border: 1px solid #2a3a2c;
    }
    .tl-co {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4a6a4e;
    }
    .tl-role {
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      font-style: italic;
      color: #8a9e8d;
    }

    @media (max-width: 860px) {
      .site-wrap { grid-template-columns: 1fr; }
      .left {
        border-right: none;
        border-bottom: 1px solid #2a3a2c;
        padding: 32px 28px;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 16px;
      }
      .photo-circle { width: 120px; }
      .left-name { font-size: 20px; }
      .left-socials { margin-top: 0; }
      .right { padding: 36px 28px; }
    }
  </style>
</head>
<body>

<div class="site-wrap">

  <aside class="left">

    <!-- CHANGE THIS: update filename if photo changes -->
    <div class="photo-circle">
      <img src="poojappp.jpg" alt="Pooja" />
    </div>

    <div class="left-name">Pooja Pisharody</div>

    <div class="left-socials">
      <!-- CHANGE THIS: update href if LinkedIn URL changes -->
      <a href="https://linkedin.com/in/poojapisharody" target="_blank" class="social-icon" title="LinkedIn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>

  </aside>

  <main class="right">

    <div class="top-section">

      <div class="star-wrap">
        <span class="star">✦</span>
        <span class="speck">✧</span>
        <span class="speck">·</span>
        <span class="speck">✶</span>
        <span class="speck">·</span>
        <span class="speck">✦</span>
      </div>

      <!-- CHANGE THIS: update headline lines -->
      <div class="headline">
        <div class="headline-name">Finance & Creative Strategy</div>
        <div class="headline-line">Design, Music, & Technology</div>
      </div>

      <!-- CHANGE THIS: update roles and companies -->
      <div class="timeline">
        <div class="tl-item">
          <span class="tl-co">Amazon</span>
          <span class="tl-role">Finance — Emerging Tech</span>
        </div>
        <div class="tl-item">
          <span class="tl-co">Live Nation</span>
          <span class="tl-role">Strategy — Music Festivals</span>
        </div>
        <div class="tl-item">
          <span class="tl-co">SMBC</span>
          <span class="tl-role">Investment Banking</span>
        </div>
      </div>

    </div>

  </main>
</div>

</body>
</html>
